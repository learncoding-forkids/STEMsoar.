<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEMsoar | Complete Lessons Workspace</title>
    <style>
        :root {
            --bg-dark: #0a0f1d;
            --bg-card: #151f38;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #243454;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Navigation Layout */
        aside {
            width: 280px;
            background-color: #0b1224;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .sidebar-header span {
            color: var(--primary);
        }

        .lesson-nav-list {
            list-style: none;
            padding: 1rem 0;
        }

        .nav-item {
            padding: 0.8rem 1.5rem;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        .nav-item:hover {
            color: var(--text-main);
            background: rgba(56, 189, 248, 0.05);
        }

        .nav-item.active {
            color: var(--primary);
            background: rgba(56, 189, 248, 0.1);
            border-left: 4px solid var(--primary);
            padding-left: 1.25rem;
        }

        /* Learning Workspace Main Frame */
        main {
            margin-left: 280px;
            flex-grow: 1;
            padding: 2.5rem;
            max-width: 1200px;
        }

        .workspace-container {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .workspace-header {
            border-bottom: 1px solid var(--border);
            padding-bottom: 1.2rem;
            margin-bottom: 2rem;
        }

        .workspace-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .lesson-paragraphs p {
            font-size: 1.1rem;
            color: #e2e8f0;
            margin-bottom: 1.5rem;
            text-align: justify;
        }

        .quiz-box {
            background: #0d162a;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2rem;
            margin-top: 2.5rem;
        }

        .quiz-title {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            color: var(--primary);
            font-weight: 700;
        }

        .question-block {
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(36, 52, 84, 0.4);
            padding-bottom: 1.5rem;
        }

        .question-block:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .quiz-question {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.6rem;
        }

        .quiz-option {
            background: #151f38;
            border: 1px solid var(--border);
            padding: 0.9rem 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .quiz-option:hover {
            border-color: #475569;
            background: #1c2b4e;
        }

        .quiz-option.correct {
            border-color: var(--success) !important;
            background: rgba(16, 185, 129, 0.1) !important;
            color: #34d399;
            font-weight: 600;
        }

        .quiz-option.wrong {
            border-color: var(--error) !important;
            background: rgba(239, 68, 68, 0.1) !important;
            color: #f87171;
        }

        .feedback-msg {
            margin-top: 0.8rem;
            font-size: 0.95rem;
            font-weight: 500;
            display: none;
        }
    </style>
</head>
<body>

    <aside>
        <div class="sidebar-header">STEM<span>soar Portal</span></div>
        <ul class="lesson-nav-list" id="sidebar-nav">
            </ul>
    </aside>

    <main>
        <div class="workspace-container">
            <div class="workspace-header">
                <h2 id="module-title">Select a Lesson</h2>
            </div>
            
            <div id="module-paragraphs" class="lesson-paragraphs">
                <p>Please select a lesson from the sidebar menu navigation framework to begin.</p>
            </div>
            
            <div class="quiz-box" id="quiz-area" style="display: none;">
                <div class="quiz-title">Knowledge Review Framework</div>
                <div id="questions-wrapper">
                    </div>
            </div>
        </div>
    </main>

    <script>
        // Database storing the full text blocks and questions for all interactive modules
        const courseDatabase = [
            {
                id: "lesson-1",
                title: "Lesson 1: Introduction to Coding",
                paragraphs: [
                    "We will begin with basic block coding. Coding is giving a robot instructions for it to follow. In the world of coding, there are many “languages” to learn or different ways to write code. We will be focusing on block and python coding.",
                    "Coding is providing detailed and formatted plans to a robot. This is the core idea of coding for all languages. Block coding consists of prepared sets of code. Each block has a unique purpose. When you structure the blocks correctly, the computer performs them in order, which is called a sequence.",
                    "Sequence is essential for coding because one mistake in the order or using an incorrect block can result in an error. Coding is used to solve problems. When you make a mistake while solving a problem in coding you need to fix it.",
                    "Fixing mistakes in code is called debugging. Debugging is necessary for coding because mistakes prevent programs from working successfully."
                ],
                questions: [
                    { q: "Do all blocks in block coding have the same purpose?", o: ["Yes", "No"], c: 1 },
                    { q: "What is it called when a computer performs blocks in order?", o: ["Sequence", "Order", "Method", "Pathway"], c: 0 },
                    { q: "What is coding used for?", o: ["Solve problems", "Social media", "Make websites", "All of the above"], c: 3 },
                    { q: "What is debugging?", o: ["Fixing mistakes", "Finalizing an idea"], c: 0 }
                ]
            },
            {
                id: "lesson-2",
                title: "Lesson 2: Block Coding Elements",
                paragraphs: [
                    "In coding there are a multitude of different functions that do different tasks. In coding, we use these functions to create solutions to various things. The fundamental functions in block coding are conditionals, and loops.",
                    "To make these functions you first require a variable which is a piece of code that stores data. This data can be altered with preset code or inputs. Inputs are coding lines that require a non-pregenerated response. They take data from and respond to someone or something giving it.",
                    "With inputs, there must be an output. Without an output the input has no purpose. Depending on the input the output can vary. This means that inputs and outputs are always linked together.",
                    "Conditionals are used to make decisions based on a condition. A loop is used to repeat a set of instructions multiple times. All parts of block coding work together to solve problems."
                ],
                questions: [
                    { q: "Inputs allow the code to do what?", o: ["Erase items", "Receive information", "Replace backgrounds", "Slow down systems"], c: 1 },
                    { q: "What must always be paired with an input?", o: ["A color code", "An extra computer", "An output", "A password"], c: 2 },
                    { q: "What is an output?", o: ["A random sound", "The action or result that happens after an input", "A broken part of code", "A type of robot"], c: 1 },
                    { q: "What are conditionals used for in block coding?", o: ["To repeat code over and over", "To make decisions based on a condition", "To erase variables", "To decorate the screen"], c: 1 },
                    { q: "What is a loop used for?", o: ["To stop the program", "To repeat a set of instructions multiple times", "To change colors", "To delete outputs"], c: 1 }
                ]
            },
            {
                id: "lesson-3",
                title: "Lesson 3: Introduction to Variables",
                paragraphs: [
                    "Think of variables as a special box that holds information. Now imagine the box has a label. The label tells you what the box is for, and inside the box you can put different things.",
                    "For example, imagine you have a box labeled 'Favorite food'. One day, you might put chocolate in the box. Another day, you might change it to a banana.",
                    "The box stays the same, but what is inside it can change. That is exactly how variables work! They help computers remember information that can change.",
                    "Variables are super useful when coding because they let us store numbers, words, or answers. If we are making a game, we might use a variable to keep track of a score."
                ],
                questions: [
                    { q: "If your variable is labeled 'Favorite Food', can you change what is inside it?", o: ["No", "Yes"], c: 1 },
                    { q: "Fill in the blank: Variables help computers ______ information.", o: ["Eat", "Hide", "Remember"], c: 2 },
                    { q: "In a video game, what might a variable be used to keep track of?", o: ["The player’s score", "The number of buttons", "The color of the sky"], c: 0 },
                    { q: "What changes when you update a variable?", o: ["The box disappears", "The label changes", "Only the information changes"], c: 2 }
                ]
            },
            {
                id: "lesson-4",
                title: "Lesson 4: How Variables Work",
                paragraphs: [
                    "Imagine you have three boxes: One labeled Snacks, One labeled Toys, One labeled Art Supplies. Because of the labels, you know what belongs in each box. If you want to find your crayons, you look in the Art Supplies box.",
                    "The label guides you. Variables work just like that. The name of the variable tells the computer what kind of information we are storing. Inside each box, the objects can be changed.",
                    "The box remains the same, but the contents change. This is exactly what happens with variables. The value inside the variable can be changed anytime we want, helping the computer remember information throughout the program.",
                    "Without variables, the computer would forget everything as soon as it happened. Variables act like the computer’s memory helpers to maintain dynamic states."
                ],
                questions: [
                    { q: "What does the label on the box (variable name) tell us?", o: ["How heavy it is", "What should go inside", "Who owns it", "How old it is"], c: 1 },
                    { q: "What can change in a variable?", o: ["The label", "The size of the box", "The contents inside the box", "The color of the box"], c: 2 },
                    { q: "Why are variables important in coding?", o: ["They help remember information", "They make it faster", "They prevent sleep", "They make things colorful"], c: 0 }
                ]
            },
            {
                id: "lesson-5",
                title: "Lesson 5: Introduction to Conditionals",
                paragraphs: [
                    "Conditionals help computers decide what to do. Just like you make choices every day, computers do too, but they need clear rules to follow. A conditional is like saying “If this happens, then do that.”",
                    "For example, imagine you are outside and you feel raindrops. You might think: If it is snowing, then put on a jacket. You made a decision based on a condition! Computers do the same thing using code.",
                    "In coding, a conditional might look like this: if score > 20: say “Nice!” This means: If the score is greater than 20, then the computer should say “Nice!” If the condition is not true, it will not perform the action.",
                    "Sometimes we use the word else to tell the computer what to do if the condition is not met. For example: if it is raining: take an umbrella else: wear sunglasses. Conditionals help programs react dynamically."
                ],
                questions: [
                    { q: "What do conditionals help computers do?", o: ["Draw pictures", "Make decisions", "Go to sleep", "Make music"], c: 1 },
                    { q: "A conditional is like saying:", o: ["“Do everything at once.”", "“If this happens, then do that.”", "“Never change anything.”", "“Always repeat forever.”"], c: 1 },
                    { q: "In the code if score > 30: say “Fabulous!”, when will it trigger?", o: ["Score is less than 10", "Score is exactly 30", "Score is greater than 30", "Score is 30"], c: 2 },
                    { q: "The word else tells the computer:", o: ["What to do if the condition is false", "To restart", "To alignment properties", "To erase layout assets"], c: 0 }
                ]
            }
        ];

        // Renders sidebar items immediately on load execution
        function initSidebar() {
            const navWrapper = document.getElementById('sidebar-nav');
            navWrapper.innerHTML = '';
            courseDatabase.forEach((lesson, index) => {
                navWrapper.innerHTML += `
                    <li class="nav-item" id="nav-${lesson.id}" onclick="selectLesson(${index})">
                        ${lesson.title}
                    </li>
                `;
            });
        }

        // Switches displayed text metrics and generates matching quiz arrays dynamically
        function selectLesson(index) {
            // Update Navigation active design classes
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            const activeLesson = courseDatabase[index];
            document.getElementById(`nav-${activeLesson.id}`).classList.add('active');

            // Set Header and Paragraph panels
            document.getElementById('module-title').innerText = activeLesson.title;
            const paragraphsBox = document.getElementById('module-paragraphs');
            paragraphsBox.innerHTML = activeLesson.paragraphs.map(p => `<p>${p}</p>`).join('');

            // Build Evaluation Quiz Matrix
            const wrapper = document.getElementById('questions-wrapper');
            wrapper.innerHTML = '';
            
            activeLesson.questions.forEach((qObj, qIdx) => {
                let optionsHTML = qObj.o.map((opt, oIdx) => `
                    <div class="quiz-option" onclick="verifyAnswer(this, ${qIdx}, ${oIdx}, ${qObj.c})">${opt}</div>
                `).join('');

                wrapper.innerHTML += `
                    <div class="question-block" id="block-q-${qIdx}">
                        <div class="quiz-question">${qIdx + 1}. ${qObj.q}</div>
                        <div class="quiz-options">${optionsHTML}</div>
                        <div class="feedback-msg" id="feed-q-${qIdx}"></div>
                    </div>
                `;
            });

            document.getElementById('quiz-area').style.display = 'block';
        }

        // Context grading function checks chosen indexes vs correct parameters
        function verifyAnswer(element, qIdx, chosenIdx, correctIdx) {
            const block = element.closest('.question-block');
            const options = block.querySelectorAll('.quiz-option');
            const feedback = block.querySelector('.feedback-msg');
            
            options.forEach(opt => opt.classList.remove('correct', 'wrong'));

            if (chosenIdx === correctIdx) {
                element.classList.add('correct');
                feedback.style.color = '#34d399';
                feedback.innerText = "✓ Correct according to the curriculum text source.";
            } else {
                element.classList.add('wrong');
                feedback.style.color = '#f87171';
                feedback.innerText = "✗ Incorrect. Reread the lesson text boxes above and select a different answer.";
            }
            feedback.style.display = 'block';
        }

        // Initialize execution on runtime launch
        initSidebar();
        selectLesson(0); // Auto-load first module instantly
    </script>
</body>
</html>
